<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogos Administrativos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --dark: #0f172a; --accent: #38bdf8; --cctv-blue: #0070c0; --cctv-green: #38b050; --tech-purple: #6366f1; }
        body { background: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .sidebar { 
            width: 240px; 
            min-height: 100vh; 
            background: var(--dark); 
            color: white; 
            position: fixed; 
            z-index: 1000; 
            transition: all 0.3s;
            left: 0;
        }
        .sidebar a { color: #94a3b8; text-decoration: none; padding: 12px 20px; display: block; transition: 0.3s; cursor: pointer; font-size: 0.9rem; }
        .sidebar a:hover { background: #1e293b; color: var(--accent); }
        .sidebar a.active { color: white; border-left: 4px solid var(--accent); background: #1e293b; }
        .main-content { 
            margin-left: 240px; 
            padding: 20px; 
            transition: all 0.3s;
        }
        body.hide-menu .sidebar { display: none !important; }
        body.hide-menu .main-content { margin-left: 0 !important; }
        body.hide-menu .btn-toggle { display: none !important; }
        @media (max-width: 768px) {
            .sidebar { left: -240px; }
            .sidebar.active { left: 0; }
            .main-content { margin-left: 0; }
            .main-content.shifted { margin-left: 0; filter: blur(2px); pointer-events: none; }
        }
        .table-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-height: 300px; }
        
        th { font-size: 0.75rem; color: #64748b; text-transform: uppercase; background: #f8fafc !important; position: relative; padding-right: 28px !important; vertical-align: middle; }
        th .th-content { display: flex; align-items: center; justify-content: center; gap: 4px; position: relative; width: 100%; }
        th .filter-trigger { cursor: pointer; color: #94a3b8; transition: 0.2s; font-size: 0.85rem; padding: 2px; }
        th .filter-trigger:hover, th .filter-trigger.active-filter { color: #0284c7; }
        
        td { vertical-align: middle; text-align: center; font-size: 0.85rem; }
        input[type="text"]:not(#riAccesoModem), input[type="email"], select, textarea { text-transform: uppercase; }
        
        .excel-filter-menu {
            position: absolute; background: white; border: 1px solid #cbd5e1; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
            border-radius: 6px; width: 250px; z-index: 1050; padding: 8px 0; display: none; text-transform: none; font-family: sans-serif;
        }
        .excel-filter-item { padding: 6px 16px; display: flex; align-items: center; gap: 10px; color: #334155; cursor: pointer; font-size: 0.85rem; }
        .excel-filter-item:hover { background: #f1f5f9; }
        .excel-filter-divider { border-top: 1px solid #e2e8f0; margin: 6px 0; }
        .excel-filter-search-box { padding: 4px 12px; }
        .excel-filter-search-box input { font-size: 0.8rem; padding: 4px 8px; border-radius: 4px; border: 1px solid #cbd5e1; width: 100%; }
        .excel-filter-list { max-height: 160px; overflow-y: auto; padding: 4px 12px; margin-top: 6px; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        .excel-filter-list .form-check { padding-top: 3px; padding-bottom: 3px; margin: 0; display: flex; align-items: center; gap: 6px; }
        .excel-filter-list .form-check-input { margin: 0; cursor: pointer; min-width: 14px; min-height: 14px; }
        .excel-filter-list .form-check-label { font-size: 0.8rem; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; width: 100%; color: #475569; }
        .excel-filter-footer { padding: 8px 12px 4px 12px; display: flex; justify-content: flex-end; gap: 8px; }
        .excel-filter-footer button { padding: 4px 12px; font-size: 0.75rem; font-weight: bold; border-radius: 4px; }

        .btn-toggle { display: none; position: fixed; bottom: 20px; right: 20px; z-index: 1001; width: 50px; height: 50px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        @media (max-width: 768px) { .btn-toggle { display: block; } }
        
        #empresa-tree { padding-left: 28px; }
        #empresa-tree .form-check { padding-left: 1.75rem; }
        #empresa-tree .form-check-input { margin-left: -1.45rem; }
        .tree-level { border-left: 1px solid #e2e8f0; margin-left: 10px; padding-left: 16px; }
        .tree-row { padding: 4px 0; }

        .select-status-activo { background-color: #d1e7dd !important; color: #0f5132 !important; }
        .select-status-baja { background-color: #f8d7da !important; color: #842029 !important; }

        .group-box { border: 1px solid #cbd5e1; border-radius: 8px; padding: 15px; background: #f8fafc; }
        .group-title { font-weight: bold; font-size: 0.85rem; color: #334155; margin-bottom: 10px; text-transform: uppercase; }
        .sub-list { padding-left: 20px; border-left: 2px dashed #cbd5e1; margin-top: 5px; margin-bottom: 10px; }

        .header-section { font-weight: bold; font-size: 0.8rem; background: #e2e8f0; padding: 6px 12px; border-radius: 4px; color: #334155; margin-bottom: 5px; }

        /* Estilos del Dashboard */
        .dash-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: none; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
        .dash-card:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
        .dash-icon { width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 15px; }

        /* Estilos específicos para las Tarjetas de Sucursales en Inicio */
        .suc-branch-card { background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; transition: transform 0.3s, box-shadow 0.3s; padding: 16px; display: flex; align-items: center; gap: 15px; }
        .suc-branch-card:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        .suc-branch-avatar { width: 64px; height: 64px; background: #f8fafc; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; border: 1px solid #e2e8f0; }
        .suc-branch-info h5 { margin: 0 0 4px 0; font-weight: 700; color: #1e293b; font-size: 1.05rem; text-transform: uppercase; }
        .suc-branch-info p { margin: 0; font-size: 0.82rem; color: #64748b; line-height: 1.4; }

        @media print {
            .no-print { display: none !important; }
            .wpa-key-input { text-transform: none !important; }
            .sidebar { display: none !important; }
            .main-content { margin-left: 0 !important; padding: 0 !important; }
            .excel-filter-menu { display: none !important; }
            th { padding-right: 8px !important; }
            th .filter-trigger { display: none !important; }
        }
    </style>
</head>
<body>

<button class="btn btn-dark btn-toggle" onclick="toggleSidebar()"><i class="bi bi-list fs-4"></i></button>
<div class="sidebar" id="sidebar">
    <div class="text-center py-4 border-bottom border-secondary mb-2"><h6 class="mb-0 fw-bold text-white">CATÁLOGOS</h6></div>
    <a onclick="renderDashboard()" id="link-dashboard" class="active"><i class="bi bi-house-door me-2"></i> Inicio</a>
    <a onclick="render('empresas')" id="link-empresas"><i class="bi bi-building me-2"></i> Empresas</a>
    <a onclick="render('servidores')" id="link-servidores"><i class="bi bi-hdd-network me-2"></i> Servidores</a>
    <a onclick="render('zonas')" id="link-zonas"><i class="bi bi-geo-alt me-2"></i> Zonas</a>
    <a onclick="render('sucursales')" id="link-sucursales"><i class="bi bi-shop me-2"></i> Sucursales</a>
    <a onclick="render('usuarios')" id="link-usuarios"><i class="bi bi-person-lines-fill me-2"></i> Usuarios</a>
    <a onclick="render('personal')" id="link-personal"><i class="bi bi-people me-2"></i> Personal</a>
    <a onclick="render('redes_inalambricas')" id="link-redes_inalambricas"><i class="bi bi-wifi me-2"></i> Redes Inalámbricas</a>
    <a onclick="render('colorcenter')" id="link-colorcenter"><i class="bi bi-file-earmark-text me-2"></i> Colorcenter</a>
</div>
<div class="main-content" id="main-content">
    <div id="view" class="table-container">
        <!-- Dashboard renderizado inicialmente por JavaScript -->
    </div>
</div>

<div id="excelFilterMenu" class="excel-filter-menu"></div>

<!-- MODAL PRINCIPAL -->
<div class="modal fade" id="modalApp" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content border-0">
            <div class="modal-header bg-dark text-white py-3">
                <h5 class="modal-title fw-bold" id="mTitle">Registro</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <input type="hidden" id="fID">
                
                <!-- Sección Específica Redes Inalámbricas -->
                <div id="secRedesInalambricas" class="d-none row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">Empresa</label>
                        <select id="riEmpresa" class="form-select"></select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">Zona</label>
                        <select id="riZona" class="form-select"><option value="">SELECCIONE ZONA...</option></select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">Sucursal</label>
                        <select id="riSucursal" class="form-select"><option value="">SELECCIONE SUCURSAL...</option></select>
                    </div>

                    <div class="col-12"><div class="header-section">VALORES DE FÁBRICA</div></div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">Módem</label>
                        <input type="text" id="riModem" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">Modelo</label>
                        <input type="text" id="riModelo" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">SSID</label>
                        <input type="text" id="riSsidFabrica" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold small">WPA KEY</label>
                        <div class="input-group">
                            <input type="password" id="riWpaFabrica" class="form-control wpa-key-input">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordVisibility('riWpaFabrica', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold small">Destinado</label>
                        <select id="riDestinado" class="form-select">
                            <option value="">SELECCIONE DESTINO...</option>
                            <option value="CCTV">CCTV</option>
                            <option value="PUNTO DE VENTA">PUNTO DE VENTA</option>
                            <option value="CCTV / PUNTO DE VENTA">CCTV / PUNTO DE VENTA</option>
                        </select>
                    </div>

                    <div class="col-12"><div class="header-section">MODIFICADOS</div></div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold small">SSID</label>
                        <input type="text" id="riSsidModificado" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold small">WPA KEY</label>
                        <div class="input-group">
                            <input type="password" id="riWpaModificado" class="form-control wpa-key-input">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordVisibility('riWpaModificado', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold small">Acceso Módem</label>
                        <input type="text" id="riAccesoModem" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold small">Fecha Última Actualización</label>
                        <input type="date" id="riFechaActualizacion" class="form-control">
                    </div>
                </div>
                
                <!-- Campos compartidos / Estructura para Usuarios y Personal -->
                <div id="secUsuariosPersonal" class="d-none row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">Empresa</label>
                        <select id="upEmpresa" class="form-select"></select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">Zona</label>
                        <select id="upZona" class="form-select"><option value="">SELECCIONE ZONA...</option></select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold small">Status Actual</label>
                        <select id="upStatus" class="form-select select-status-activo" onchange="updateStatusStyle(this)">
                            <option value="ACTIVO" class="select-status-activo">ACTIVO</option>
                            <option value="BAJA" class="select-status-baja">BAJA</option>
                        </select>
                    </div>
                    
                    <div id="secFormIndividualUP" class="row g-3 m-0 p-0">
                        <div class="col-md-4"><label class="form-label fw-bold small">N° de Empleado</label><input type="text" id="upNumEmp" class="form-control"></div>
                        <div class="col-md-8"><label class="form-label fw-bold small">Nombre Completo</label><input type="text" id="upNombre" class="form-control"></div>
                        <div class="col-md-4"><label class="form-label fw-bold small">Puesto</label><input type="text" id="upPuesto" class="form-control"></div>
                        <div class="col-md-4"><label class="form-label fw-bold small">Número Largo</label><input type="text" id="upNumLargo" class="form-control"></div>
                        <div class="col-md-4"><label class="form-label fw-bold small">Marcación Corta</label><input type="text" id="upMarcCorta" class="form-control"></div>
                        
                        <div class="col-12 mt-3" id="wrapperAccesosRoma">
                            <div class="group-box">
                                <div class="group-title">Accesos Grupo Roma</div>
                                <div class="form-check mb-2">
                                    <input class="form-check-input ctx-trigger" type="checkbox" id="chkGroupDesarrollos" data-target="boxDesarrollos">
                                    <label class="form-check-label fw-semibold" for="chkGroupDesarrollos">Desarrollos Propios</label>
                                </div>
                                <div id="boxDesarrollos" class="sub-list d-none"></div>

                                <div class="form-check mb-2">
                                    <input class="form-check-input ctx-trigger" type="checkbox" id="chkGroupServidores" data-target="boxServidores">
                                    <label class="form-check-label fw-semibold" for="chkGroupServidores">Servidores</label>
                                </div>
                                <div id="boxServidores" class="sub-list d-none"></div>

                                <div class="form-check mb-2">
                                    <input class="form-check-input ctx-trigger" type="checkbox" id="chkGroupComex" data-target="boxComex">
                                    <label class="form-check-label fw-semibold" for="chkGroupComex">Comex</label>
                                </div>
                                <div id="boxComex" class="sub-list d-none"></div>

                                <div class="form-check mb-2">
                                    <input class="form-check-input ctx-trigger" type="checkbox" id="chkGroupCorreos" data-target="boxCorreos">
                                    <label class="form-check-label fw-semibold" for="chkGroupCorreos">Correos</label>
                                </div>
                                <div id="boxCorreos" class="sub-list d-none"></div>

                                <div class="form-check mb-2">
                                    <input class="form-check-input ctx-trigger" type="checkbox" id="chkGroupFirewall" data-target="boxFirewall">
                                    <label class="form-check-label fw-semibold" for="chkGroupFirewall">Firewall</label>
                                </div>
                                <div id="boxFirewall" class="sub-list d-none"></div>

                                <!-- Contenedor Principal de Cámaras -->
                                <div class="opcion-acceso">
                                    <label>
                                        <input type="checkbox" id="check-camaras" onchange="toggleCamaras()"> 
                                        <strong>Cámaras</strong>
                                    </label>
                                    <div id="desplegable-camaras" style="display: none; margin-left: 20px; margin-top: 5px;">
                                        <label style="display: block; margin-bottom: 5px;">
                                            <input type="checkbox" name="acceso_camaras" value="hik_connect"> Hik-Connect
                                        </label>
                                        <label style="display: block;">
                                            <input type="checkbox" name="acceso_camaras" value="meriva"> Meriva
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Formulario Antiguo / Otros Catálogos -->
                <div id="secOtrosCatalogos" class="row">
                    <div id="secEmpresa" class="col-md-6 mb-3 d-none">
                        <label class="form-label fw-bold small">Empresa</label>
                        <select id="fEmp" class="form-select"></select>
                    </div>
                    <div id="secZona" class="col-md-6 mb-3 d-none">
                        <label class="form-label fw-bold small">Zona</label>
                        <select id="fZona" class="form-select"></select>
                    </div>
                    <div id="secIndividual" class="col-12">
                        <label class="form-label fw-bold small mb-1" id="lblNom">Nombre / Descripción</label>
                        <input type="text" id="fNom" class="form-control">
                    </div>
                    <div id="secSucursalesCamaras" class="col-12 mt-3 d-none">
                        <label class="form-label fw-bold small mb-1">N° de Cámaras</label>
                        <input type="number" id="fCamaras" class="form-control" min="0" placeholder="0">
                    </div>
                </div>

                <!-- Sección de Carga Masiva unificada -->
                <div id="secMasivo" class="col-12 d-none">
                    <label class="form-label fw-bold text-primary small mb-1" id="lblMasivo">Datos masivos</label>
                    <textarea id="fMasivo" class="form-control font-monospace" rows="6" style="font-size: 0.8rem;"></textarea>
                </div>
            </div>
            
            <div class="modal-footer flex-column bg-light border-0 px-4 pb-4">
                <div id="secToggleMasivo" class="w-100 form-check form-switch mb-3 d-none">
                    <input class="form-check-input" type="checkbox" id="checkMasivo">
                    <label class="form-check-label small fw-bold text-secondary" for="checkMasivo">Activar Carga Masiva</label>
                </div>
                <button class="btn btn-primary w-100 py-2 fw-bold fs-6" id="btnSave">Guardar Información</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalEmpresas" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">Asignar sucursales</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="empresa-tree"></div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="guardarAsignacion()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const config = { databaseURL: "https://gromasis-9c094-default-rtdb.firebaseio.com/" };
    const db = getDatabase(initializeApp(config));
    
    let store = { colorcenter:{}, redes_inalambricas: {}, personal: {}, zonas: {}, empresas: {}, servidores: {}, sucursales: {}, usuarios: {} };
    let currentPath = '';
    let loadsPending = Object.keys(store).length;
    const urlParams = new URLSearchParams(window.location.search);

    let activeFiltersState = {};

    const listsRoma = {
        desarrollos: ["SUMMA++", "SUMMA ADV", "TASK", "SALES ENGINE", "MCI", "PEDIDOS FERREPRECIOS", "ST-GR", "CONTROL VEHICULAR", "SOPORTES", "SAS WEB"],
        comex: ["AXXESS", "VOCACION DE TIENDA", "XADMIN", "XSTORE", "BIG FIX", "SCALEFUSION"],
        correos: ["INSTITUCIONAL", "GMAIL", "WEBEX", "TIENDA"],
        firewall: ["CONTABILIDAD", "NOMINAS", "HUATUSCO", "TESORERIA"]
    };

    if (urlParams.get('tipo') === 'colorcenter') {
        document.body.classList.add('hide-menu');
    }

    Object.keys(store).forEach(path => {
        onValue(ref(db, path), (s) => {
            store[path] = s.val() || {};
            if (loadsPending > 0) loadsPending--;
            if (loadsPending === 0) {
                if (urlParams.get('tipo') === 'colorcenter') {
                    render('colorcenter');
                } else if (currentPath === '') {
                    renderDashboard();
                } else {
                    render(currentPath);
                }
            }
        });
    });

    window.renderDashboard = () => {
        currentPath = '';
        document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
        document.getElementById('link-dashboard')?.classList.add('active');

        let totalCamaras = 0;
        Object.values(store.sucursales).forEach(s => {
            totalCamaras += parseInt(s.camaras || 0, 10);
        });

        // Extraer listado único ordenado de empresas del catálogo
        const empsDisponibles = Object.values(store.empresas).map(e => e.nombre).filter(Boolean).sort();

        const html = `
            <div class="p-3">
                <div class="text-center mb-4 mt-3">
                    <i class="bi bi-cloud-check text-primary display-3"></i>
                    <h3 class="mt-3 fw-bold text-dark">Bienvenido al Sistema de Gestión</h3>
                    <p class="text-secondary">Monitoreo de infraestructura, accesos y telecomunicaciones corporativas</p>
                </div>

                <!-- CONTENEDOR DE NUEVOS FILTROS EN INICIO -->
                <div class="bg-white rounded-3 p-4 mb-5 border shadow-sm">
                    <h6 class="fw-bold text-dark mb-3 text-uppercase tracking-wider" style="font-size:0.8rem;"><i class="bi bi-funnel-fill text-primary me-1"></i> Consultar Sucursales</h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold text-secondary small">Empresa</label>
                            <select id="dashFiltroEmpresa" class="form-select shadow-sm" onchange="dashActualizarZonas(this.value)">
                                <option value="">SELECCIONE EMPRESA...</option>
                                ${empsDisponibles.map(e => `<option value="${e}">${e}</option>`).join('')}
                            </select>
                        </div>

    window.dashActualizarSucursales = () => {
        const empSel = document.getElementById("dashFiltroEmpresa").value;
        const zonaSel = document.getElementById("dashFiltroZona").value;
        const contenedor = document.getElementById("dashContenedorSucursales");

        if(!empSel || !zonaSel) {
            contenedor.classList.add("d-none");
            contenedor.innerHTML = "";
            return;

        // Filtrar sucursales correspondientes
        const sucursalesFiltradas = Object.values(store.sucursales).filter(s => s.empresa === empSel && s.zona === zonaSel).sort((a,b) => (a.nombre || "").localeCompare(b.nombre || ""));

        if(sucursalesFiltradas.length === 0) {
            contenedor.innerHTML = `<div class="col-12 text-center text-muted py-3">No hay sucursales registradas para esta empresa y zona.</div>`;
            contenedor.classList.remove("d-none");
            return;
        }

        let cardsHtml = sucursalesFiltradas.map(suc => {
            const nomSuc = suc.nombre || "";
            
            // Cruzar datos en caliente de los demás nodos del store
            const camsCount = parseInt(suc.camaras || 0, 10);
            const persCount = Object.values(store.personal).filter(p => p.empresa === empSel && p.zona === zonaSel && p.statusActual === "ACTIVO").length;
            const wifiCount = Object.values(store.redes_inalambricas).filter(r => r.empresa === empSel && r.zona === zonaSel && r.sucursal === nomSuc).length;
            const ccCount = Object.values(store.colorcenter).filter(c => c.empresa === empSel && c.zona === zonaSel && c.sucursal === nomSuc).length;

            return `
                <div class="col-xl-4 col-md-6">
                    <div class="suc-branch-card">
                        <div class="suc-branch-avatar text-primary">
                            <i class="bi bi-shop"></i>
                        </div>
                        <div class="suc-branch-info">
                            <h5>${nomSuc}</h5>
                            <p><strong>Cámaras Activas:</strong> ${camsCount}</p>
                            <p><strong>Personas Activas:</strong> ${persCount}</p>
                            <p><strong>Wifi:</strong> ${wifiCount}</p>
                            <p><strong>Equipos color center:</strong> ${ccCount}</p>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        contenedor.innerHTML = cardsHtml;
        contenedor.classList.remove("d-none");

    window.openExcelFilterMenu = (event, colIndex) => {
        event.stopPropagation();
        const menu = document.getElementById("excelFilterMenu");
        const trigger = event.target;
        const rect = trigger.getBoundingClientRect();
        
        const table = document.getElementById("mainCatalogTable");
        const rows = table.getElementsByTagName("tbody")[0].getElementsByTagName("tr");
        let uniqueValues = new Set();
        
        for (let i = 0; i < rows.length; i++) {
            const cell = rows[i].getElementsByTagName("td")[colIndex];
            if(cell) {
                let txt = cell.textContent || cell.innerText;
                uniqueValues.add(txt.trim());
            }
        }
        
        const sortedValues = Array.from(uniqueValues).sort((a,b) => a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'}));
        const savedChecked = activeFiltersState[colIndex];

        let menuHtml = `
            <div class="excel-filter-item" onclick="sortColumn(${colIndex}, 'ASC')"><i class="bi bi-sort-alpha-down"></i> Ordenar de A a Z</div>
            <div class="excel-filter-item" onclick="sortColumn(${colIndex}, 'DESC')"><i class="bi bi-sort-alpha-up"></i> Ordenar de Z a A</div>
            <div class="excel-filter-divider"></div>
            <div class="excel-filter-item" onclick="clearColumnFilter(${colIndex})"><i class="bi bi-funnel"></i> Borrar filtro de esta columna</div>
            <div class="excel-filter-divider"></div>
            <div class="excel-filter-search-box">
                <input type="text" placeholder="Buscar..." onkeyup="filterExcelList(this)">
            </div>
            <div class="excel-filter-list">
                <div class="form-check">
                    <input class="form-check-input select-all-excel" type="checkbox" id="excelAll_${colIndex}" checked onchange="toggleSelectAllExcel(this)">
                    <label class="form-check-label" for="excelAll_${colIndex}">(Seleccionar todo)</label>
                </div>
                ${sortedValues.map((val, idx) => {
                    const isChecked = savedChecked ? savedChecked.includes(val) : true;
                    return `
                    <div class="form-check val-item">
                        <input class="form-check-input excel-check" type="checkbox" value="${val}" id="chk_${colIndex}_${idx}" ${isChecked ? 'checked' : ''} onchange="syncSelectAllExcel(${colIndex})">
                        <label class="form-check-label" for="chk_${colIndex}_${idx}">${val}</label>
                    </div>`;
                }).join('')}
            </div>
            <div class="excel-filter-footer">
                <button class="btn btn-sm btn-outline-secondary" onclick="closeExcelMenu()">Cancelar</button>
                <button class="btn btn-sm btn-primary" onclick="submitExcelFilter(${colIndex})">Aceptar</button>
            </div>
        `;
        
        menu.innerHTML = menuHtml;
        menu.style.top = `${rect.bottom + window.scrollY}px`;
        menu.style.left = `${Math.min(rect.left + window.scrollX, window.innerWidth - 270)}px`;
        menu.style.display = "block";
        
        syncSelectAllExcel(colIndex);
    };

    window.filterExcelList = (input) => {
        const text = input.value.toUpperCase();
        const container = input.closest(".excel-filter-menu");
        const items = container.querySelectorAll(".val-item");
        items.forEach(item => {
            const label = item.querySelector(".form-check-label").textContent.toUpperCase();
            item.style.setProperty("display", label.includes(text) ? "flex" : "none", "important");
        });
    };

    window.toggleSelectAllExcel = (master) => {
        const container = master.closest(".excel-filter-list");
        const checks = container.querySelectorAll(".val-item input[type='checkbox']");
        checks.forEach(chk => {
            if(chk.closest(".val-item").style.display !== "none") {
                chk.checked = master.checked;
            }
        });
    };

    window.syncSelectAllExcel = (colIndex) => {
        const menu = document.getElementById("excelFilterMenu");
        const master = menu.querySelector(".select-all-excel");
        const checks = Array.from(menu.querySelectorAll(".val-item input[type='checkbox']"));
        const checkedCount = checks.filter(c => c.checked).length;
        
        if (checkedCount === checks.length) {
            master.checked = true;
            master.indeterminate = false;
        } else if (checkedCount === 0) {
            master.checked = false;
            master.indeterminate = false;
        } else {
            master.checked = false;
            master.indeterminate = true;
        }
    };

    window.closeExcelMenu = () => {
        document.getElementById("excelFilterMenu").style.display = "none";
    };

    window.submitExcelFilter = (colIndex) => {
        const menu = document.getElementById("excelFilterMenu");
        const checkedBoxes = menu.querySelectorAll(".val-item input[type='checkbox']:checked");
        const totalBoxes = menu.querySelectorAll(".val-item input[type='checkbox']");
        
        if (checkedBoxes.length === totalBoxes.length) {
            delete activeFiltersState[colIndex];
        } else {
            activeFiltersState[colIndex] = Array.from(checkedBoxes).map(c => c.value);
        }
        
        applyAllActiveFilters();
        closeExcelMenu();
    };

    window.clearColumnFilter = (colIndex) => {
        delete activeFiltersState[colIndex];
        applyAllActiveFilters();
        closeExcelMenu();
    };

    const applyAllActiveFilters = () => {
        const table = document.getElementById("mainCatalogTable");
        if (!table) return;
        const rows = table.getElementsByTagName("tbody")[0].getElementsByTagName("tr");
        const filterKeys = Object.keys(activeFiltersState);
        
        table.querySelectorAll(".filter-trigger").forEach(trig => {
            const idx = trig.dataset.colIndex;
            if (activeFiltersState[idx]) {
                trig.className = "bi bi-funnel-fill filter-trigger active-filter";
            } else {
                trig.className = "bi bi-caret-down-fill filter-trigger";
            }
        });

        for (let i = 0; i < rows.length; i++) {
            let rowVisible = true;
            const cells = rows[i].getElementsByTagName("td");
            
            for (let colIdx of filterKeys) {
                if (cells[colIdx]) {
                    const txt = (cells[colIdx].textContent || cells[colIdx].innerText).trim();
                    const allowedValues = activeFiltersState[colIdx];
                    if (!allowedValues.includes(txt)) {
                        rowVisible = false;
                        break;
                    }
                }
            }
            rows[i].style.display = rowVisible ? "" : "none";
        }
    };

    window.sortColumn = (colIndex, direction) => {
        const table = document.getElementById("mainCatalogTable");
        const tbody = table.getElementsByTagName("tbody")[0];
        const rows = Array.from(tbody.getElementsByTagName("tr"));
        
        rows.sort((rowA, rowB) => {
            const cellA = rowA.getElementsByTagName("td")[colIndex].textContent.trim();
            const cellB = rowB.getElementsByTagName("td")[colIndex].textContent.trim();
            
            return direction === 'ASC' 
                ? cellA.localeCompare(cellB, undefined, {numeric: true, sensitivity: 'base'})
                : cellB.localeCompare(cellA, undefined, {numeric: true, sensitivity: 'base'});
        });
        
        rows.forEach(row => tbody.appendChild(row));
        closeExcelMenu();
    };

    document.addEventListener("click", (e) => {
        const menu = document.getElementById("excelFilterMenu");
        if(menu && !menu.contains(e.target)) {
            closeExcelMenu();
        }
    });

    const setBoxData = (boxId, storagePrefix, savedData) => {
        const box = document.getElementById(boxId);
        if(!box || !savedData) return;
        Object.keys(savedData).forEach(itemName => {
            const cleanName = itemName.replace(/[^a-zA-Z0-9]/g, '');
            const chk = box.querySelector(`#chk_${storagePrefix}_${cleanName}`);
            const input = box.querySelector(`#user_${storagePrefix}_${cleanName}`);
            if(chk && input) {
                chk.checked = true;
                input.value = savedData[itemName];
            }
        });
    };

            const input = row.querySelector('.sub-item-user');
            if(chk && chk.checked) {
                res[chk.dataset.name] = input.value.trim().toUpperCase();

        });
        return Object.keys(res).length > 0 ? res : null;
    };

            const renderZonasRI = (empSel, zonaPrev = "") => {

    document.getElementById("btnSave").onclick = async () => {
        const id = document.getElementById("fID").value;

        let data = {};

        if (currentPath === 'redes_inalambricas') {
            const empRI = document.getElementById("riEmpresa").value;
            const zonRI = document.getElementById("riZona").value;
            const sucRI = document.getElementById("riSucursal").value;

            if (isM) {
                if(!empRI || !zonRI || !sucRI) {
                    Swal.fire("Atención", "Para la carga masiva debe seleccionar previamente Empresa, Zona y Sucursal en los desplegables.", "warning");
                    return;
                }
                const lineas = document.getElementById("fMasivo").value.split('\n').filter(l => l.trim());
                if (lineas.length === 0) { Swal.fire("Atención", "Ingrese datos en la caja de texto masivo.", "warning"); return; }
                
                for(let l of lineas) {
                    const c = l.split(',').map(field => field.trim());
                    if(c.length >= 9) {
                        let regRI = {
                            empresa: empRI, zona: zonRI, sucursal: sucRI,
                            modem: c[0].toUpperCase(), modelo: c[1].toUpperCase(), ssidFabrica: c[2].toUpperCase(),
                            wpaFabrica: c[3], destinado: c[4].toUpperCase(), ssidModificado: c[5].toUpperCase(),
                            wpaModificado: c[6], accesoModem: c[7], fechaActualizacion: c[8]
                        };
                        await push(ref(db, currentPath), regRI);
                    }
                }
           } else {
                let camposFaltantes = [];
                
                const empRI = document.getElementById("riEmpresa").value;
                const zonRI = document.getElementById("riZona").value;
                const sucRI = document.getElementById("riSucursal").value;
                const modem = document.getElementById("riModem").value.trim().toUpperCase();
                const modelo = document.getElementById("riModelo").value.trim().toUpperCase();
                const ssidFabrica = document.getElementById("riSsidFabrica").value.trim().toUpperCase();
                const wpaFabrica = document.getElementById("riWpaFabrica").value.trim();
                const destinado = document.getElementById("riDestinado").value;
                const ssidModificado = document.getElementById("riSsidModificado").value.trim().toUpperCase();
                const wpaModificado = document.getElementById("riWpaModificado").value.trim();
                const accesoModem = document.getElementById("riAccesoModem").value.trim();
                const fechaActualizacion = document.getElementById("riFechaActualizacion").value;

                if (!empRI) camposFaltantes.push("Empresa");
                if (!zonRI) camposFaltantes.push("Zona");
                if (!sucRI) camposFaltantes.push("Sucursal");
                if (!modem) camposFaltantes.push("Módem");
                if (!modelo) camposFaltantes.push("Modelo");
                if (!ssidFabrica) camposFaltantes.push("SSID Fábrica");
                if (!wpaFabrica) camposFaltantes.push("WPA Key Fábrica");
                if (!destinado) camposFaltantes.push("Destinado");
                if (!ssidModificado) camposFaltantes.push("SSID Modificado");
                if (!wpaModificado) camposFaltantes.push("WPA Key Modificada");
                if (!accesoModem) camposFaltantes.push("Acceso Módem");
                if (!fechaActualizacion) camposFaltantes.push("Fecha Última Actualización");

                if (camposFaltantes.length > 0) {
                    Swal.fire({
                        title: "Falta Información",
                        html: `<div class="text-start"><strong>No se puede guardar el registro. Hacen falta los siguientes campos obligatorios:</strong><br><br>
                               ${camposFaltantes.map(f => `<span class="text-danger">• ${f}</span>`).join('<br>')}</div>`,
                        icon: "error"
                    });
                    return; 
                }

                data = {
                    empresa: empRI, zona: zonRI, sucursal: sucRI, modem, modelo,
                    ssidFabrica, wpaFabrica, destinado, ssidModificado, wpaModificado,
                    accesoModem, fechaActualizacion
                };

                id ? await update(ref(db, `${currentPath}/${id}`), data) : await push(ref(db, currentPath), data);
            }

        } else if (['usuarios', 'personal'].includes(currentPath)) {
            const empresaSeleccionada = document.getElementById("upEmpresa").value;
            const zonaSeleccionada = document.getElementById("upZona").value;
            const statusActualizado = document.getElementById("upStatus").value;

            if(!empresaSeleccionada) { Swal.fire("Atención", "Por favor seleccione una Empresa.", "warning"); return; }

            if (isM) {
                const lineas = document.getElementById("fMasivo").value.split('\n').filter(l => l.trim());
                if (lineas.length === 0) { Swal.fire("Atención", "Por favor ingresa los datos.", "warning"); return; }

                for (let l of lineas) {
                    const campos = l.split(',').map(c => c.trim());
                    let registroMasivo = {
                        empresa: empresaSeleccionada, zona: zonaSeleccionada, statusActual: statusActualizado,
                        numeroEmpleado: (campos[0] || '').toUpperCase(), nombreCompleto: (campos[1] || '').toUpperCase(),
                        puesto: (campos[2] || '').toUpperCase(), numeroLargo: campos[3] || '', marcacionCorta: campos[4] || ''
                    };
                    if (registroMasivo.nombreCompleto) await push(ref(db, currentPath), registroMasivo);
                }
            } else {
                data = {
                    empresa: empresaSeleccionada, zona: zonaSeleccionada, statusActual: statusActualizado,
                    numeroEmpleado: document.getElementById("upNumEmp").value.toUpperCase(),
                    nombreCompleto: document.getElementById("upNombre").value.toUpperCase(),
                    puesto: document.getElementById("upPuesto").value.toUpperCase(),
                    numeroLargo: document.getElementById("upNumLargo").value,
                    marcacionCorta: document.getElementById("upMarcCorta").value,
                    accesosGrupoRoma: {
                        desarrollosPropios: document.getElementById("chkGroupDesarrollos").checked ? collectBoxData("boxDesarrollos", "des") : null,
                        servidores: document.getElementById("chkGroupServidores").checked ? collectBoxData("boxServidores", "srv") : null,
                        comex: document.getElementById("chkGroupComex").checked ? collectBoxData("boxComex", "cmx") : null,

                        firewall: document.getElementById("chkGroupFirewall").checked ? collectBoxData("boxFirewall", "frw") : null
                    }
                };
                if (!data.nombreCompleto) { Swal.fire("Atención", "El campo Nombre Completo es obligatorio.", "warning"); return; }
                id ? await update(ref(db, `${currentPath}/${id}`), data) : await push(ref(db, currentPath), data);
            }

        } else {
            if (currentPath === 'colorcenter') {
                data = {
                    empresa: document.getElementById("ccEmp").value, zona: document.getElementById("ccZona").value, sucursal: document.getElementById("ccSuc").value,
                    modeloDosificador: document.getElementById("ccModDos").value.toUpperCase(), imgDosificador: document.getElementById("ccImgDosBase64").value,
                    modeloRevolvedora: document.getElementById("ccModRev").value.toUpperCase(), imgRevolvedora: document.getElementById("ccImgRevBase64").value
                };
            } else {
                data.nombre = document.getElementById("fNom").value.toUpperCase();
            }

            if (['zonas', 'sucursales'].includes(currentPath)) data.empresa = document.getElementById("fEmp").value;
            if (currentPath === 'sucursales') {
                data.zona = document.getElementById("fZona").value;
                data.camaras = document.getElementById("fCamaras").value || 0;
            }

            if (isM) {
                const lineas = document.getElementById("fMasivo").value.split('\n').filter(l => l.trim());
                if (lineas.length === 0) { Swal.fire("Atención", "Lista masiva vacía.", "warning"); return; }
                for (let l of lineas) {
                    let regM = { nombre: l.trim().toUpperCase() };
                    if (['zonas', 'sucursales'].includes(currentPath)) regM.empresa = document.getElementById("fEmp").value;
                    if (currentPath === 'sucursales') { regM.zona = document.getElementById("fZona").value; regM.camaras = document.getElementById("fCamaras").value || 0; }

            } else {
                if (currentPath !== 'colorcenter' && !data.nombre) { Swal.fire("Atención", "El campo Nombre no puede estar vacío.", "warning"); return; }
                id ? await update(ref(db, `${currentPath}/${id}`), data) : await push(ref(db, currentPath), data);
            }
        }

        bootstrap.Modal.getInstance(document.getElementById("modalApp")).hide();
        Swal.fire({ icon: "success", title: "Guardado Completado", timer: 1000, showConfirmButton: false });

        if (!allCheck) return;
        const sucursales = Array.from(document.querySelectorAll(`.suc-check[data-empresa="${CSS.escape(empresa)}"][data-zona="${CSS.escape(zona)}"]`));
        const seleccionadas = sucursales.filter(chk => chk.checked);
        allCheck.checked = sucursales.length > 0 && seleccionadas.length === sucursales.length;
        allCheck.indeterminate = seleccionadas.length > 0 && seleccionadas.length < sucursales.length;

    const buildAsignacionTree = () => {
        const empresas = Object.values(store.empresas).sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
        if (!empresas.length) return '<div class="text-center text-muted py-4">No hay empresas registradas.</div>';

        return empresas.map(emp => {
            const empresa = emp.nombre || '';
            const empId = `emp-${cleanAsignacionId(empresa)}`;
            const empresaAsignada = getEmpresaAsignada(empresa);
            const empresaChecked = empresaAsignada ? 'checked' : '';
            const empresaVisible = empresaAsignada ? '' : 'd-none';
            const zonas = Object.values(store.zonas).filter(z => z.empresa === empresa).sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));

            const zonasHtml = zonas.length ? zonas.map(z => {
                const zona = z.nombre || '';
                const zonaId = `zona-${cleanAsignacionId(empresa)}-${cleanAsignacionId(zona)}`;
                const zonaAsignada = getZonaAsignada(empresa, zona);
                const zonaChecked = zonaAsignada ? 'checked' : '';
                const zonaVisible = zonaAsignada ? '' : 'd-none';
                const sucursalesSeleccionadas = zonaAsignada?.sucursales || [];
                const sucursales = Object.values(store.sucursales).filter(s => s.empresa === empresa && s.zona === zona).sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
                const allSucId = `all-${cleanAsignacionId(empresa)}-${cleanAsignacionId(zona)}`;
                const todasSeleccionadas = sucursales.length > 0 && sucursales.every(s => sucursalesSeleccionadas.includes(s.nombre || ''));
                const allSucChecked = todasSeleccionadas ? 'checked' : '';

                const sucursalesHtml = sucursales.length ? sucursales.map(s => {
                    const sucursal = s.nombre || '';
                    const sucId = `suc-${cleanAsignacionId(empresa)}-${cleanAsignacionId(zona)}-${cleanAsignacionId(sucursal)}`;
                    const sucChecked = sucursalesSeleccionadas.includes(sucursal) ? 'checked' : '';
                    return `
                        <div class="form-check tree-row">
                            <input class="form-check-input suc-check" type="checkbox" value="${sucursal}" id="${sucId}" data-empresa="${empresa}" data-zona="${zona}" ${sucChecked}>
                            <label class="form-check-label small" for="${sucId}">${sucursal}</label>
                        </div>`;
                }).join('') : '<div class="tree-muted">Sin sucursales.</div>';
                
                const seleccionarTodasHtml = sucursales.length ? `
                    <div class="form-check tree-row">
                        <input class="form-check-input all-suc-check" type="checkbox" id="${allSucId}" data-empresa="${empresa}" data-zona="${zona}" ${allSucChecked}>
                        <label class="form-check-label small tree-select-all" for="${allSucId}">Seleccionar todas</label>
                    </div>` : '';

                return `
                    <div class="mb-1">
                        <div class="form-check tree-row">
                            <input class="form-check-input zona-check" type="checkbox" value="${zona}" id="${zonaId}" data-empresa="${empresa}" ${zonaChecked}>
                            <label class="form-check-label small fw-semibold" for="${zonaId}">${zona}</label>
                        </div>
                        <div class="tree-level sucursal-group ${zonaVisible}" data-empresa="${empresa}" data-zona="${zona}">
                            ${seleccionarTodasHtml}
                            ${sucursalesHtml}
                        </div>
                    </div>`;
            }).join('') : '<div class="tree-muted">Sin zonas.</div>';

            return `
                <div class="mb-2">
                    <div class="form-check tree-row">
                        <input class="form-check-input emp-check" type="checkbox" value="${empresa}" id="${empId}" ${empresaChecked}>
                        <label class="form-check-label fw-semibold" for="${empId}">${empresa}</label>
                    </div>
                    <div class="tree-level zona-group ${empresaVisible}" data-empresa="${empresa}">
                        ${zonasHtml}
                    </div>
                </div>`;
        }).join('');
    };

    window.openEmpresaModal = (userId) => {
        currentUserId = userId;
        document.getElementById("empresa-tree").innerHTML = buildAsignacionTree();
        syncAllSucursalesChecks();
        new bootstrap.Modal(document.getElementById("modalEmpresas")).show();
    };

    document.getElementById("empresa-tree").addEventListener("change", (e) => {
        const target = e.target;
        if (target.classList.contains("emp-check")) {
            const empresa = target.value;
            const grupoZonas = document.querySelector(`.zona-group[data-empresa="${CSS.escape(empresa)}"]`);
            grupoZonas?.classList.toggle("d-none", !target.checked);
            if (!target.checked) {
                grupoZonas?.querySelectorAll("input[type='checkbox']").forEach(chk => {
                    chk.checked = false;
                    chk.indeterminate = false;
                    if (chk.classList.contains("zona-check")) {
                        document.querySelector(`.sucursal-group[data-empresa="${CSS.escape(empresa)}"][data-zona="${CSS.escape(chk.value)}"]`)?.classList.add("d-none");
                    }
                });
            }
        }
        if (target.classList.contains("zona-check")) {
            const empresa = target.dataset.empresa;
            const zona = target.value;
            const grupoSucursales = document.querySelector(`.sucursal-group[data-empresa="${CSS.escape(empresa)}"][data-zona="${CSS.escape(zona)}"]`);
            grupoSucursales?.classList.toggle("d-none", !target.checked);
            if (target.checked) {
                document.querySelector(`.emp-check[value="${CSS.escape(empresa)}"]`).checked = true;
                document.querySelector(`.zona-group[data-empresa="${CSS.escape(empresa)}"]`)?.classList.remove("d-none");
            } else {
                grupoSucursales?.querySelectorAll(".suc-check, .all-suc-check").forEach(chk => { chk.checked = false; chk.indeterminate = false; });
            }
        }
        if (target.classList.contains("all-suc-check")) {
            const empresa = target.dataset.empresa;
            const zona = target.dataset.zona;
            const checked = target.checked;
            document.querySelector(`.emp-check[value="${CSS.escape(empresa)}"]`).checked = true;
            document.querySelector(`.zona-check[data-empresa="${CSS.escape(empresa)}"][value="${CSS.escape(zona)}"]`).checked = true;
            document.querySelector(`.zona-group[data-empresa="${CSS.escape(empresa)}"]`)?.classList.remove("d-none");
            document.querySelector(`.sucursal-group[data-empresa="${CSS.escape(empresa)}"][data-zona="${CSS.escape(zona)}"]`)?.classList.remove("d-none");
            document.querySelectorAll(`.suc-check[data-empresa="${CSS.escape(empresa)}"][data-zona="${CSS.escape(zona)}"]`).forEach(chk => chk.checked = checked);
            target.indeterminate = false;
        }
        if (target.classList.contains("suc-check") && target.checked) {
            const empresa = target.dataset.empresa;
            const zona = target.dataset.zona;
            document.querySelector(`.emp-check[value="${CSS.escape(empresa)}"]`).checked = true;
            document.querySelector(`.zona-check[data-empresa="${CSS.escape(empresa)}"][value="${CSS.escape(zona)}"]`).checked = true;
            document.querySelector(`.zona-group[data-empresa="${CSS.escape(empresa)}"]`)?.classList.remove("d-none");
            document.querySelector(`.sucursal-group[data-empresa="${CSS.escape(empresa)}"][data-zona="${CSS.escape(zona)}"]`)?.classList.remove("d-none");
        }
        if (target.classList.contains("suc-check")) {
            syncAllSucursalesCheck(target.dataset.empresa, target.dataset.zona);
        }
    });

    window.guardarAsignacion = async () => {
        if (!currentUserId) return;
        const asignacionSucursales = [];
        document.querySelectorAll(".emp-check:checked").forEach(empChk => {
            const empresa = empChk.value;
            const zones = [];
            document.querySelectorAll(`.zona-check[data-empresa="${CSS.escape(empresa)}"]:checked`).forEach(zonaChk => {
                const zona = zonaChk.value;
                const sucursales = Array.from(document.querySelectorAll(`.suc-check[data-empresa="${CSS.escape(empresa)}"][data-zona="${CSS.escape(zona)}"]:checked`)).map(chk => chk.value);
                zones.push({ zona, sucursales });
            });
            asignacionSucursales.push({ empresa, zonas: zones });
        });
        try {
            await update(ref(db, `${currentPath}/${currentUserId}`), { asignacionSucursales });
            Swal.fire({ icon: "success", title: "Asignación guardada", timer: 1200, showConfirmButton: false });
            bootstrap.Modal.getInstance(document.getElementById("modalEmpresas")).hide();
        } catch (e) { Swal.fire("Error", e.message, "error"); }
    };

    // Hacer funciones globales disponibles fuera del módulo ESM
    window.renderDashboard = renderDashboard;
    window.render = render;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };
</script>
</body>
</html>
