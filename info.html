<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogos Administrativos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --dark: #0f172a; --accent: #38bdf8; --cctv-blue: #0070c0; --cctv-green: #38b050; --tech-purple: #6366f1; }
        body { background: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .sidebar { 
            width: 240px; 
            min-height: 100vh; 
            background: var(--dark); 
            color: white; 
            position: fixed; 
            z-index: 1000; 
            transition: all 0.3s;
            left: 0;
        }
        .sidebar a { color: #94a3b8; text-decoration: none; padding: 12px 20px; display: block; transition: 0.3s; cursor: pointer; font-size: 0.9rem; }
        .sidebar a:hover { background: #1e293b; color: var(--accent); }
        .sidebar a.active { color: white; border-left: 4px solid var(--accent); background: #1e293b; }
        .main-content { 
            margin-left: 240px; 
            padding: 20px; 
            transition: all 0.3s;
        }
        body.hide-menu .sidebar { display: none !important; }
        body.hide-menu .main-content { margin-left: 0 !important; }
        body.hide-menu .btn-toggle { display: none !important; }
        @media (max-width: 768px) {
            .sidebar { left: -240px; }
            .sidebar.active { left: 0; }
            .main-content { margin-left: 0; }
            .main-content.shifted { margin-left: 0; filter: blur(2px); pointer-events: none; }
        }
        .table-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-height: 300px; }
        th { font-size: 0.7rem; color: #64748b; text-transform: uppercase; text-align: center; background: #f8fafc !important; }
        td { vertical-align: middle; text-align: center; font-size: 0.85rem; }
        input[type="text"], input[type="email"], select, textarea { text-transform: uppercase; }
        .cctv-header { background: var(--cctv-blue); color: white; font-weight: bold; padding: 5px 15px; margin-bottom: 10px; border-radius: 4px; }
        .tech-header { background: var(--tech-purple); color: white; font-weight: bold; padding: 5px 15px; margin-bottom: 10px; border-radius: 4px; }
        .cctv-green-header { background: var(--cctv-green); color: white; font-weight: bold; padding: 5px 15px; margin-top: 15px; }
        .cctv-label { background: #e9ecef; font-weight: bold; font-size: 0.75rem; border: 1px solid #dee2e6; padding: 4px 8px; }
        .cctv-input { border: 1px solid #dee2e6; padding: 4px 8px; font-size: 0.8rem; width: 100%; }
        .item-box { border: 1px solid #dee2e6; padding: 10px; background: #fff; height: 100%; position: relative; border-radius: 4px; }
        .signature-line { border-top: 1px solid #000; margin-top: 40px; font-size: 0.7rem; text-align: center; }
        .btn-toggle { display: none; position: fixed; bottom: 20px; right: 20px; z-index: 1001; width: 50px; height: 50px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        @media (max-width: 768px) { .btn-toggle { display: block; } }
        
        .pdf-header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .pdf-actions { display: flex; gap: 8px; }
        .btn-print { background-color: #212529; color: white; border: none; width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer;}
        .btn-back { background-color: #dc3545; color: white; border: none; width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer;}
        .btn-print:hover, .btn-back:hover { opacity: 0.8; transform: scale(1.05); }

        .btn-remove-item { border: none; background: transparent; color: #dc3545; padding: 0; line-height: 1; transition: 0.2s; }
        .btn-remove-item:hover { transform: scale(1.2); }
        #empresa-tree { padding-left: 28px; }
        #empresa-tree .form-check { padding-left: 1.75rem; }
        #empresa-tree .form-check-input { margin-left: -1.45rem; }
        .tree-level { border-left: 1px solid #e2e8f0; margin-left: 10px; padding-left: 16px; }
        .tree-row { padding: 4px 0; }
        .tree-select-all { color: #0d6efd; font-weight: 600; }
        .tree-muted { color: #94a3b8; font-size: 0.78rem; padding: 4px 0 8px 28px; }

        /* Estilos para los inputs de filtro */
        .filter-input {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
            width: 100%;
        }
        .filter-row {
            background: #f8fafc;
        }

        @media print {
            .no-print { display: none !important; }
            .sidebar { display: none !important; }
            .main-content { margin-left: 0 !important; padding: 0 !important; }
            .table-container { box-shadow: none !important; border: none !important; }
            #capture-area { border: none !important; width: 100% !important; max-width: 100% !important; margin: 0 !important; }
            .filter-row { display: none !important; }
        }
    </style>
</head>
<body>

<button class="btn btn-dark btn-toggle" onclick="toggleSidebar()"><i class="bi bi-list fs-4"></i></button>
<div class="sidebar" id="sidebar">
    <div class="text-center py-4 border-bottom border-secondary mb-2"><h6 class="mb-0 fw-bold text-white">CATÁLOGOS</h6></div>
    <a onclick="render('empresas')" id="link-empresas"><i class="bi bi-building me-2"></i> Empresas</a>
    <a onclick="render('zonas')" id="link-zonas"><i class="bi bi-geo-alt me-2"></i> Zonas</a>
    <a onclick="render('sucursales')" id="link-sucursales"><i class="bi bi-shop me-2"></i> Sucursales</a>
    <a onclick="render('usuarios')" id="link-usuarios"><i class="bi bi-person-lines-fill me-2"></i> Usuarios</a>
    <a onclick="render('personal')" id="link-personal"><i class="bi bi-people me-2"></i> Personal</a>
    <a onclick="render('redes_inalambricas')" id="link-redes_inalambricas"><i class="bi bi-wifi me-2"></i> Redes Inalámbricas</a>
    <a onclick="render('colorcenter')" id="link-colorcenter"><i class="bi bi-file-earmark-text me-2"></i> Colorcenter</a>
</div>
<div class="main-content" id="main-content">
    <div id="view" class="table-container">
        <div class="text-center py-5 text-muted">
            <i class="bi bi-cloud-check display-1"></i>
            <h4 class="mt-3">Bienvenido al Sistema</h4>
            <p>Selecciona un módulo en el menú lateral.</p>
        </div>
    </div>
</div>
<div class="modal fade" id="modalApp" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0">
            <div class="modal-header bg-dark text-white py-3">
                <h5 class="modal-title fw-bold" id="mTitle">Registro</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <input type="hidden" id="fID">
                <div class="row">
                    <div id="secEmpresa" class="col-md-6 mb-3 d-none">
                        <label class="form-label fw-bold small">Empresa</label>
                        <select id="fEmp" class="form-select"></select>
                    </div>
                    <div id="secZona" class="col-md-6 mb-3 d-none">
                        <label class="form-label fw-bold small">Zona</label>
                        <select id="fZona" class="form-select"></select>
                    </div>
                    <div id="secMatriz" class="d-none row g-3">
                        <div class="col-md-6"><label class="form-label fw-bold small">Artículos</label><input type="text" id="mArt" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label fw-bold small">Modelo</label><input type="text" id="mMod" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label fw-bold small">Descripción</label><input type="text" id="mDes" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label fw-bold small">Marca</label><input type="text" id="mMar" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label fw-bold small">Cantidad</label><input type="number" id="mCant" class="form-control"></div>
                    </div>
                    <div id="secUsuarios" class="d-none row g-3">
                        <div class="col-md-6"><label class="form-label fw-bold small">Departamento</label><input type="text" id="uDep" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label fw-bold small">Puesto</label><input type="text" id="uPue" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label fw-bold small">Usuario Acceso</label><input type="text" id="uUsu" class="form-control"></div>
                        <div class="col-md-6"><label class="form-label fw-bold small">Contraseña</label><input type="password" id="uPass" class="form-control"></div>
                    </div>
                    <div id="secIndividual" class="col-12">
                        <label class="form-label fw-bold small mb-1" id="lblNom">Nombre / Descripción</label>
                        <input type="text" id="fNom" class="form-control">
                    </div>
                    <div id="secSucursalesCamaras" class="col-12 mt-3 d-none">
                        <label class="form-label fw-bold small mb-1">N° de Cámaras</label>
                        <input type="number" id="fCamaras" class="form-control" min="0" placeholder="0">
                    </div>
                    <div id="secMasivo" class="col-12 d-none">
                        <label class="form-label fw-bold small mb-1">Nombres (Uno por línea)</label>
                        <textarea id="fMasivo" class="form-control" rows="5" placeholder="EJEMPLO 1&#10;EJEMPLO 2&#10;EJEMPLO 3"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer flex-column bg-light border-0 px-4 pb-4">
                <div id="secToggleMasivo" class="w-100 form-check form-switch mb-3 d-none">
                    <input class="form-check-input" type="checkbox" id="checkMasivo">
                    <label class="form-check-label small fw-bold text-secondary" for="checkMasivo">Activar Carga Masiva</label>
                </div>
                <button class="btn btn-primary w-100 py-2 fw-bold fs-6" id="btnSave">Guardar Información</button>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="modalEmpresas" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">Asignar sucursales</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="empresa-tree"></div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="guardarAsignacion()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const config = { databaseURL: "https://gromasis-9c094-default-rtdb.firebaseio.com/" };
    const db = getDatabase(initializeApp(config));
    
    let store = { colorcenter:{}, redes_inalambricas: {}, personal: {}, zonas: {}, empresas: {}, sucursales: {}, usuarios: {} };
    let currentPath = '';
    let loadsPending = Object.keys(store).length;
    const urlParams = new URLSearchParams(window.location.search);

    if (currentPath === '') {
        if (urlParams.get('tipo') === 'colorcenter') {
            document.body.classList.add('hide-menu');
            render('colorcenter');
        }
    }

    Object.keys(store).forEach(path => {
        onValue(ref(db, path), (s) => {
            store[path] = s.val() || {};
            if (loadsPending > 0) loadsPending--;
            if (loadsPending === 0 && currentPath === path) {
                render(path);
            }
        });
    });

    window.render = (path) => {
        currentPath = path;
        document.querySelectorAll('.sidebar a').forEach(el => el.classList.remove('active'));
        document.getElementById(`link-${path}`)?.classList.add('active');
        
        const items = store[path] || {};
        const keys = Object.keys(items);
        let displayTitle = path.toUpperCase().replace('_', ' ');

        let html = `<div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold m-0">${displayTitle}</h4>
                        <button class="btn btn-dark" onclick="showModal('${path}')"><i class="bi bi-plus-lg"></i> Nuevo</button>
                    </div>`;
        
        if (keys.length === 0) {
            html += `<div class="text-center py-5 text-muted">No hay registros</div>`;
        } else {
            html += `<div class="table-responsive"><table class="table table-hover border" id="mainCatalogTable">
                <thead>
                    <tr>
                        ${path === 'colorcenter' ? '<th>Empresa</th><th>Zona</th><th>Sucursal</th><th>Mod. Dosificador</th><th>Img Dosificador</th><th>Mod. Revolvedora</th><th>Img Revolvedora</th>' : `
                            ${['usuarios','sucursales','zonas'].includes(path) ? '<th>Empresa</th>' : ''}
                            ${['usuarios','sucursales'].includes(path) ? '<th>Zona</th>' : ''}
                            ${['redes_inalambricas', 'personal'].includes(path) ? '<th>Artículos</th><th>Modelo</th><th>Descripción</th><th>Marca</th><th>Cant.</th>' : '<th class="text-start">Nombre</th>'}
                            ${path === 'sucursales' ? '<th>N° Cámaras</th>' : ''}
                        `}
                        <th class="text-end no-filter-col">Acciones</th>
                    </tr>
                    <tr class="filter-row">
                        ${path === 'colorcenter' ? `
                            <td><input type="text" class="form-control filter-input" placeholder="Filtrar..." onkeyup="filterTable(0)"></td>
                            <td><input type="text" class="form-control filter-input" placeholder="Filtrar..." onkeyup="filterTable(1)"></td>
                            <td><input type="text" class="form-control filter-input" placeholder="Filtrar..." onkeyup="filterTable(2)"></td>
                            <td><input type="text" class="form-control filter-input" placeholder="Filtrar..." onkeyup="filterTable(3)"></td>
                            <td></td>
                            <td><input type="text" class="form-control filter-input" placeholder="Filtrar..." onkeyup="filterTable(5)"></td>
                            <td></td>
                        ` : `
                            ${['usuarios','sucursales','zonas'].includes(path) ? '<td><input type="text" class="form-control filter-input" placeholder="Filtrar..." onkeyup="filterTable(0)"></td>' : ''}
                            ${['usuarios','sucursales'].includes(path) ? `<td><input type="text" class="form-control filter-input" placeholder="Filtrar..." onkeyup="filterTable(${path==='usuarios'||path==='sucursales'? 1 : 0})"></td>` : ''}
                            
                            ${['redes_inalambricas', 'personal'].includes(path) ? `
                                <td><input type="text" class="form-control filter-input" placeholder="Filtrar..." onkeyup="filterTable(0)"></td>
                                <td><input type="text" class="form-control filter-input" placeholder="Filtrar..." onkeyup="filterTable(1)"></td>
                                <td><input type="text" class="form-control filter-input" placeholder="Filtrar..." onkeyup="filterTable(2)"></td>
                                <td><input type="text" class="form-control filter-input" placeholder="Filtrar..." onkeyup="filterTable(3)"></td>
                                <td><input type="text" class="form-control filter-input" placeholder="Filtrar..." onkeyup="filterTable(4)"></td>
                            ` : `
                                <td><input type="text" class="form-control filter-input" placeholder="Filtrar..." onkeyup="filterTable(${['usuarios','sucursales'].includes(path) ? 2 : (path==='zonas' ? 1 : 0)})"></td>
                            `}
                            
                            ${path === 'sucursales' ? '<td><input type="text" class="form-control filter-input" placeholder="Filtrar..." onkeyup="filterTable(3)"></td>' : ''}
                        `}
                        <td></td>
                    </tr>
                </thead>
                <tbody>`;
                
            keys.forEach(id => {
                const r = items[id];
                if (path === 'colorcenter') {
                    html += `<tr>
                        <td><small>${r.empresa || '-'}</small></td>
                        <td><small>${r.zona || '-'}</small></td>
                        <td><small>${r.sucursal || '-'}</small></td>
                        <td>${r.modeloDosificador || '-'}</td>
                        <td>${r.imgDosificador ? `<img src="${r.imgDosificador}" style="height:40px; border-radius:4px;">` : '-'}</td>
                        <td>${r.modeloRevolvedora || '-'}</td>
                        <td>${r.imgRevolvedora ? `<img src="${r.imgRevolvedora}" style="height:40px; border-radius:4px;">` : '-'}</td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-secondary border-0" onclick="showModal('${path}', '${id}')"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-outline-danger border-0" onclick="del('${path}', '${id}')"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>`;
                } else {
                    html += `<tr>
                        ${['usuarios','sucursales','zonas'].includes(path) ? `<td><small>${r.empresa || '-'}</small></td>` : ''}
                        ${['usuarios','sucursales'].includes(path) ? `<td><small>${r.zona || '-'}</small></td>` : ''}
                        ${['redes_inalambricas', 'personal'].includes(path) ? 
                            `<td class="text-start fw-bold">${r.articulos || '-'}</td><td>${r.modelo || '-'}</td><td><small>${r.descripcion || '-'}</small></td><td>${r.marca || '-'}</td><td>${r.cantidad || '-'}</td>` : 
                            `<td class="text-start">${r.nombre}</td>`
                        }
                        ${path === 'sucursales' ? `<td><span class="badge bg-secondary">${r.camaras || '0'}</span></td>` : ''}
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-secondary border-0" onclick="showModal('${path}', '${id}')"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-outline-danger border-0" onclick="del('${path}', '${id}')"><i class="bi bi-trash"></i></button>
                           ${path === 'usuarios' ? `<button class="btn btn-sm btn-outline-success border-0" onclick="openEmpresaModal('${id}')"><i class="bi bi-building"></i></button>` : ''} 
                        </td>
                    </tr>`;
                }
            });
            html += `</tbody></table></div>`;
        }
        document.getElementById("view").innerHTML = html;
    };

    // Función global para filtrar dinámicamente cada columna
    window.filterTable = () => {
        const table = document.getElementById("mainCatalogTable");
        if (!table) return;
        const rows = table.getElementsByTagName("tbody")[0].getElementsByTagName("tr");
        const filterInputs = table.querySelectorAll(".filter-input");
        
        // Mapear los índices de columna reales que tienen filtros activos
        const activeFilters = [];
        filterInputs.forEach(input => {
            if (input.value.trim() !== "") {
                // Obtener el índice de la celda (td) contenedora del input
                const cellIndex = input.closest("td").cellIndex;
                activeFilters.push({ index: cellIndex, val: input.value.toUpperCase() });
            }
        });

        for (let i = 0; i < rows.length; i++) {
            let rowVisible = true;
            const cells = rows[i].getElementsByTagName("td");
            
            // Validar contra todos los filtros activos
            for (let filter of activeFilters) {
                if (cells[filter.index]) {
                    const content = cells[filter.index].textContent || cells[filter.index].innerText;
                    if (content.toUpperCase().indexOf(filter.val) === -1) {
                        rowVisible = false;
                        break; 
                    }
                }
            }
            rows[i].style.display = rowVisible ? "" : "none";
        }
    };
    
    window.showModal = (path, id = "") => {
        const item = id ? store[path][id] : {};
        document.getElementById("fID").value = id;
        
        let displayTitle = path.toUpperCase().replace('_', ' ');
        document.getElementById("mTitle").innerText = (id ? 'Editar ' : 'Nuevo ') + displayTitle;
        
        ['secEmpresa', 'secZona', 'secUsuarios', 'secMatriz', 'secMasivo', 'secToggleMasivo', 'secSucursalesCamaras'].forEach(s => document.getElementById(s).classList.add('d-none'));
        document.getElementById("secIndividual").classList.remove('d-none');
        document.getElementById("checkMasivo").checked = false;
        document.getElementById("secColorCenter")?.remove();
        document.getElementById("fCamaras").value = "";

        if (path === 'colorcenter') {
            document.getElementById("secIndividual").classList.add('d-none');
            const divCC = document.createElement('div');
            divCC.id = "secColorCenter";
            divCC.className = "row g-3";
            divCC.innerHTML = `
                <div class="col-md-4"><label class="form-label fw-bold small">Empresa</label><select id="ccEmp" class="form-select"><option value="">SELECCIONE...</option></select></div>
                <div class="col-md-4"><label class="form-label fw-bold small">Zona</label><select id="ccZona" class="form-select"><option value="">ZONA</option></select></div>
                <div class="col-md-4"><label class="form-label fw-bold small">Sucursal</label><select id="ccSuc" class="form-select"><option value="">SUCURSAL</option></select></div>
                <div class="col-md-6"><label class="form-label fw-bold small">Modelo del Dosificador</label><input type="text" id="ccModDos" class="form-control" placeholder="MODELO DOSIFICADOR"></div>
                <div class="col-md-6"><label class="form-label fw-bold small">Imagen Dosificador</label><input type="file" id="ccImgDos" class="form-control" accept="image/*"><input type="hidden" id="ccImgDosBase64"></div>
                <div class="col-md-6"><label class="form-label fw-bold small">Modelo de la Revolvedora</label><input type="text" id="ccModRev" class="form-control" placeholder="MODELO REVOLVEDORA"></div>
                <div class="col-md-6"><label class="form-label fw-bold small">Imagen Revolvedora</label><input type="file" id="ccImgRev" class="form-control" accept="image/*"><input type="hidden" id="ccImgRevBase64"></div>
            `;
            document.getElementById("secIndividual").parentNode.insertBefore(divCC, document.getElementById("secIndividual"));

            const emps = Object.values(store.empresas).map(e => e.nombre).sort();
            document.getElementById("ccEmp").innerHTML = '<option value="">SELECCIONE...</option>' + emps.map(e => `<option value="${e}" ${item.empresa === e ? 'selected' : ''}>${e}</option>`).join('');

            const actualizarZonasCC = (empresaSeleccionada, zonaPrevia = "") => {
                const zs = Object.values(store.zonas).filter(z => z.empresa === empresaSeleccionada).map(z => z.nombre).sort();
                document.getElementById("ccZona").innerHTML = '<option value="">ZONA</option>' + zs.map(z => `<option value="${z}" ${zonaPrevia === z ? 'selected' : ''}>${z}</option>`).join('');
                document.getElementById("ccSuc").innerHTML = '<option value="">SUCURSAL</option>';
            };

            const actualizarSucursalesCC = (zonaSeleccionada, sucursalPrevia = "") => {
                const empresaSeleccionada = document.getElementById("ccEmp").value;
                const ss = Object.values(store.sucursales).filter(s => s.empresa === empresaSeleccionada && s.zona === zonaSeleccionada).map(s => s.nombre).sort();
                document.getElementById("ccSuc").innerHTML = '<option value="">SUCURSAL</option>' + ss.map(s => `<option value="${s}" ${sucursalPrevia === s ? 'selected' : ''}>${s}</option>`).join('');
            };

            document.getElementById("ccEmp").onchange = (e) => actualizarZonasCC(e.target.value);
            document.getElementById("ccZona").onchange = (e) => actualizarSucursalesCC(e.target.value);

            const fReader = (inputEl, hiddenEl) => {
                inputEl.onchange = (e) => {
                    const file = e.target.files[0];
                    if(file) {
                        const reader = new FileReader();
                        reader.onload = (el) => hiddenEl.value = el.target.result;
                        reader.readAsDataURL(file);
                    }
                };
            };
            fReader(document.getElementById("ccImgDos"), document.getElementById("ccImgDosBase64"));
            fReader(document.getElementById("ccImgRev"), document.getElementById("ccImgRevBase64"));

            if(id) {
                document.getElementById("ccModDos").value = item.modeloDosificador || "";
                document.getElementById("ccModRev").value = item.modeloRevolvedora || "";
                document.getElementById("ccImgDosBase64").value = item.imgDosificador || "";
                document.getElementById("ccImgRevBase64").value = item.imgRevolvedora || "";
                if(item.empresa) {
                    actualizarZonasCC(item.empresa, item.zona);
                    if(item.zona) actualizarSucursalesCC(item.zona, item.sucursal);
                }
            }
        }

        if (['redes_inalambricas', 'personal'].includes(path)) {
            document.getElementById("secIndividual").classList.add('d-none');
            document.getElementById("secMatriz").classList.remove('d-none');
            document.getElementById("mArt").value = item.articulos || "";
            document.getElementById("mMod").value = item.modelo || "";
            document.getElementById("mDes").value = item.descripcion || "";
            document.getElementById("mMar").value = item.marca || "";
            document.getElementById("mCant").value = item.cantidad || "";
        }
        if (['zonas', 'sucursales', 'usuarios'].includes(path)) {
            document.getElementById("secEmpresa").classList.remove('d-none');
            const emps = Object.values(store.empresas).map(e => e.nombre).sort();
            document.getElementById("fEmp").innerHTML = '<option value="">SELECCIONE...</option>' + emps.map(e => `<option value="${e}" ${item.empresa === e ? 'selected' : ''}>${e}</option>`).join('');
            
            if(item.empresa) {
               const zs = Object.values(store.zonas).filter(z => z.empresa === item.empresa).map(z => z.nombre).sort();
               document.getElementById("secZona").classList.remove('d-none');
               document.getElementById("fZona").innerHTML = '<option value="">SELECCIONE ZONA...</option>' + zs.map(z => `<option value="${z}" ${item.zona === z ? 'selected' : ''}>${z}</option>`).join('');
            }
        }
        if (path === 'usuarios') {
            document.getElementById("secUsuarios").classList.remove('d-none');
            document.getElementById("uDep").value = item.departamento || "";
            document.getElementById("uPue").value = item.puesto || "";
            document.getElementById("uUsu").value = item.usuario || "";
            document.getElementById("uPass").value = item.pass || "";
        }
        if (path === 'sucursales') {
            document.getElementById("secSucursalesCamaras").classList.remove('d-none');
            document.getElementById("fCamaras").value = item.camaras || "";
        }
        
        document.getElementById("fNom").value = item.nombre || "";

        if (!id && !['redes_inalambricas', 'personal', 'colorcenter'].includes(path)) {
            document.getElementById("secToggleMasivo").classList.remove('d-none');
            const txtMasivo = document.querySelector("#secMasivo label");
            if (txtMasivo) txtMasivo.innerText = `Nombres para el catálogo ${displayTitle} (Uno por línea)`;
        }

        document.getElementById("fEmp").onchange = (e) => {
            if(['sucursales', 'usuarios'].includes(path)){
                const zs = Object.values(store.zonas).filter(z => z.empresa === e.target.value).map(z => z.nombre).sort();
                document.getElementById("secZona").classList.remove('d-none');
                document.getElementById("fZona").innerHTML = '<option value="">SELECCIONE ZONA...</option>' + zs.map(z => `<option value="${z}">${z}</option>`).join('');
            }
        };

        new bootstrap.Modal(document.getElementById("modalApp")).show();
    };

    document.getElementById("btnSave").onclick = async () => {
        const id = document.getElementById("fID").value;
        const isM = document.getElementById("checkMasivo").checked;
        let data = {};

        if (currentPath === 'colorcenter') {
            data = {
                empresa: document.getElementById("ccEmp").value,
                zona: document.getElementById("ccZona").value,
                sucursal: document.getElementById("ccSuc").value,
                modeloDosificador: document.getElementById("ccModDos").value.toUpperCase(),
                imgDosificador: document.getElementById("ccImgDosBase64").value,
                modeloRevolvedora: document.getElementById("ccModRev").value.toUpperCase(),
                imgRevolvedora: document.getElementById("ccImgRevBase64").value
            };
            if(!data.empresa || !data.zona || !data.sucursal){
                Swal.fire("Atención", "Por favor completa la Empresa, Zona y Sucursal.", "warning");
                return;
            }
        } else if (['redes_inalambricas', 'personal'].includes(currentPath)) {
            data = { 
                articulos: document.getElementById("mArt").value.toUpperCase(), 
                modelo: document.getElementById("mMod").value.toUpperCase(), 
                descripcion: document.getElementById("mDes").value.toUpperCase(), 
                marca: document.getElementById("mMar").value.toUpperCase(),
                cantidad: document.getElementById("mCant").value
            };
        } else {
            data.nombre = document.getElementById("fNom").value.toUpperCase();
        }

        if (['zonas', 'sucursales', 'usuarios'].includes(currentPath)) data.empresa = document.getElementById("fEmp").value;
        if (['sucursales', 'usuarios'].includes(currentPath)) data.zona = document.getElementById("fZona").value;
        if (currentPath === 'sucursales') data.camaras = document.getElementById("fCamaras").value || 0;
        
        if (currentPath === 'usuarios') {
            data.departamento = document.getElementById("uDep").value.toUpperCase();
            data.puesto = document.getElementById("uPue").value.toUpperCase();
            data.usuario = document.getElementById("uUsu").value;
            data.pass = document.getElementById("uPass").value;
        }

        try {
            if (isM) {
                const lineas = document.getElementById("fMasivo").value.split('\n').filter(l => l.trim());
                if (lineas.length === 0) {
                    Swal.fire("Atención", "Por favor ingresa al menos un registro en la lista.", "warning");
                    return;
                }
                for (let l of lineas) {
                    let registroMasivo = { nombre: l.trim().toUpperCase() };
                    if (['zonas', 'sucursales', 'usuarios'].includes(currentPath)) registroMasivo.empresa = document.getElementById("fEmp").value;
                    if (['sucursales', 'usuarios'].includes(currentPath)) registroMasivo.zona = document.getElementById("fZona").value;
                    if (currentPath === 'sucursales') registroMasivo.camaras = document.getElementById("fCamaras").value || 0;
                    await push(ref(db, currentPath), registroMasivo);
                }
            } else {
                if (!['redes_inalambricas', 'personal', 'colorcenter'].includes(currentPath) && !data.nombre) {
                    Swal.fire("Atención", "El campo Nombre no puede estar vacío.", "warning");
                    return;
                }
                id ? await update(ref(db, `${currentPath}/${id}`), data) : await push(ref(db, currentPath), data);
            }
            bootstrap.Modal.getInstance(document.getElementById("modalApp")).hide();
            Swal.fire({ icon: "success", title: "Guardado Completado", timer: 1000, showConfirmButton: false });
        } catch (e) { 
            Swal.fire("Error", e.message, "error"); 
        }
    };

    window.del = async (p, id) => {
        const res = await Swal.fire({ title: '¿Eliminar?', icon: 'warning', showCancelButton: true });
        if (res.isConfirmed) await remove(ref(db, `${p}/${id}`));
    };

    window.toggleSidebar = () => {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('main-content').classList.toggle('shifted');
    };

    document.getElementById("checkMasivo").onchange = (e) => {
        document.getElementById("secIndividual").classList.toggle('d-none', e.target.checked);
        document.getElementById("secMasivo").classList.toggle('d-none', !e.target.checked);
        if (['redes_inalambricas', 'personal'].includes(currentPath)) {
            document.getElementById("secMatriz").classList.toggle('d-none', e.target.checked);
        }
        if (currentPath === 'usuarios') {
            document.getElementById("secUsuarios").classList.toggle('d-none', e.target.checked);
        }
        if (currentPath === 'sucursales') {
            document.getElementById("secSucursalesCamaras").classList.remove('d-none');
        }
    };

    let currentUserId = null;
    const cleanAsignacionId = (txt) => String(txt || '').replace(/[^a-zA-Z0-9_-]/g, '_');
    
    const getAsignacionUsuario = () => {
        const asignacion = store.usuarios[currentUserId]?.asignacionSucursales;
        return Array.isArray(asignacion) ? asignacion : [];
    };

    const getEmpresaAsignada = (empresa) => getAsignacionUsuario().find(a => a.empresa === empresa);

    const getZonaAsignada = (empresa, zona) => {
        const emp = getEmpresaAsignada(empresa);
        return emp?.zonas?.find(z => z.zona === zona);
    };

    const syncAllSucursalesCheck = (empresa, zona) => {
        const allCheck = document.querySelector(`.all-suc-check[data-empresa="${CSS.escape(empresa)}"][data-zona="${CSS.escape(zona)}"]`);
        if (!allCheck) return;
        const sucursales = Array.from(document.querySelectorAll(`.suc-check[data-empresa="${CSS.escape(empresa)}"][data-zona="${CSS.escape(zona)}"]`));
        const seleccionadas = sucursales.filter(chk => chk.checked);
        allCheck.checked = sucursales.length > 0 && seleccionadas.length === sucursales.length;
        allCheck.indeterminate = seleccionadas.length > 0 && seleccionadas.length < sucursales.length;
    };

    const syncAllSucursalesChecks = () => {
        document.querySelectorAll(".all-suc-check").forEach(chk => {
            syncAllSucursalesCheck(chk.dataset.empresa, chk.dataset.zona);
        });
    };

    const buildAsignacionTree = () => {
        const empresas = Object.values(store.empresas).sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
        if (!empresas.length) return '<div class="text-center text-muted py-4">No hay empresas registradas.</div>';

        return empresas.map(emp => {
            const empresa = emp.nombre || '';
            const empId = `emp-${cleanAsignacionId(empresa)}`;
            const empresaAsignada = getEmpresaAsignada(empresa);
            const empresaChecked = empresaAsignada ? 'checked' : '';
            const empresaVisible = empresaAsignada ? '' : 'd-none';
            const zonas = Object.values(store.zonas).filter(z => z.empresa === empresa).sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));

            const zonasHtml = zonas.length ? zonas.map(z => {
                const zona = z.nombre || '';
                const zonaId = `zona-${cleanAsignacionId(empresa)}-${cleanAsignacionId(zona)}`;
                const zonaAsignada = getZonaAsignada(empresa, zona);
                const zonaChecked = zonaAsignada ? 'checked' : '';
                const zonaVisible = zonaAsignada ? '' : 'd-none';
                const sucursalesSeleccionadas = zonaAsignada?.sucursales || [];
                const sucursales = Object.values(store.sucursales).filter(s => s.empresa === empresa && s.zona === zona).sort((a, b) => (a.nombre || '').localeCompare(b.nombre || ''));
                const allSucId = `all-${cleanAsignacionId(empresa)}-${cleanAsignacionId(zona)}`;
                const todasSeleccionadas = sucursales.length > 0 && sucursales.every(s => sucursalesSeleccionadas.includes(s.nombre || ''));
                const allSucChecked = todasSeleccionadas ? 'checked' : '';

                const sucursalesHtml = sucursales.length ? sucursales.map(s => {
                    const sucursal = s.nombre || '';
                    const sucId = `suc-${cleanAsignacionId(empresa)}-${cleanAsignacionId(zona)}-${cleanAsignacionId(sucursal)}`;
                    const sucChecked = sucursalesSeleccionadas.includes(sucursal) ? 'checked' : '';
                    return `
                        <div class="form-check tree-row">
                            <input class="form-check-input suc-check" type="checkbox" value="${sucursal}" id="${sucId}" data-empresa="${empresa}" data-zona="${zona}" ${sucChecked}>
                            <label class="form-check-label small" for="${sucId}">${sucursal}</label>
                        </div>`;
                }).join('') : '<div class="tree-muted">Sin sucursales registradas en esta zona.</div>';
                
                const seleccionarTodasHtml = sucursales.length ? `
                    <div class="form-check tree-row">
                        <input class="form-check-input all-suc-check" type="checkbox" id="${allSucId}" data-empresa="${empresa}" data-zona="${zona}" ${allSucChecked}>
                        <label class="form-check-label small tree-select-all" for="${allSucId}">Seleccionar todas las sucursales</label>
                    </div>` : '';

                return `
                    <div class="mb-1">
                        <div class="form-check tree-row">
                            <input class="form-check-input zona-check" type="checkbox" value="${zona}" id="${zonaId}" data-empresa="${empresa}" ${zonaChecked}>
                            <label class="form-check-label small fw-semibold" for="${zonaId}">${zona}</label>
                        </div>
                        <div class="tree-level sucursal-group ${zonaVisible}" data-empresa="${empresa}" data-zona="${zona}">
                            ${seleccionarTodasHtml}
                            ${sucursalesHtml}
                        </div>
                    </div>`;
            }).join('') : '<div class="tree-muted">Sin zonas registradas para esta empresa.</div>';

            return `
                <div class="mb-2">
                    <div class="form-check tree-row">
                        <input class="form-check-input emp-check" type="checkbox" value="${empresa}" id="${empId}" ${empresaChecked}>
                        <label class="form-check-label fw-semibold" for="${empId}">${empresa}</label>
                    </div>
                    <div class="tree-level zona-group ${empresaVisible}" data-empresa="${empresa}">
                        ${zonasHtml}
                    </div>
                </div>`;
        }).join('');
    };

    window.openEmpresaModal = (userId) => {
        currentUserId = userId;
        document.getElementById("empresa-tree").innerHTML = buildAsignacionTree();
        syncAllSucursalesChecks();
        new bootstrap.Modal(document.getElementById("modalEmpresas")).show();
    };

    document.getElementById("empresa-tree").addEventListener("change", (e) => {
        const target = e.target;
        if (target.classList.contains("emp-check")) {
            const empresa = target.value;
            const grupoZonas = document.querySelector(`.zona-group[data-empresa="${CSS.escape(empresa)}"]`);
            grupoZonas?.classList.toggle("d-none", !target.checked);
            if (!target.checked) {
                grupoZonas?.querySelectorAll("input[type='checkbox']").forEach(chk => {
                    chk.checked = false;
                    chk.indeterminate = false;
                    if (chk.classList.contains("zona-check")) {
                        document.querySelector(`.sucursal-group[data-empresa="${CSS.escape(empresa)}"][data-zona="${CSS.escape(chk.value)}"]`)?.classList.add("d-none");
                    }
                });
            }
        }

        if (target.classList.contains("zona-check")) {
            const empresa = target.dataset.empresa;
            const zona = target.value;
            const grupoSucursales = document.querySelector(`.sucursal-group[data-empresa="${CSS.escape(empresa)}"][data-zona="${CSS.escape(zona)}"]`);
            grupoSucursales?.classList.toggle("d-none", !target.checked);

            if (target.checked) {
                const empresaCheck = document.querySelector(`.emp-check[value="${CSS.escape(empresa)}"]`);
                empresaCheck.checked = true;
                document.querySelector(`.zona-group[data-empresa="${CSS.escape(empresa)}"]`)?.classList.remove("d-none");
            } else {
                grupoSucursales?.querySelectorAll(".suc-check, .all-suc-check").forEach(chk => {
                    chk.checked = false;
                    chk.indeterminate = false;
                });
            }
        }

        if (target.classList.contains("all-suc-check")) {
            const empresa = target.dataset.empresa;
            const zona = target.dataset.zona;
            const checked = target.checked;
            document.querySelector(`.emp-check[value="${CSS.escape(empresa)}"]`).checked = true;
            document.querySelector(`.zona-check[data-empresa="${CSS.escape(empresa)}"][value="${CSS.escape(zona)}"]`).checked = true;
            document.querySelector(`.zona-group[data-empresa="${CSS.escape(empresa)}"]`)?.classList.remove("d-none");
            document.querySelector(`.sucursal-group[data-empresa="${CSS.escape(empresa)}"][data-zona="${CSS.escape(zona)}"]`)?.classList.remove("d-none");
            document.querySelectorAll(`.suc-check[data-empresa="${CSS.escape(empresa)}"][data-zona="${CSS.escape(zona)}"]`).forEach(chk => chk.checked = checked);
            target.indeterminate = false;
        }

        if (target.classList.contains("suc-check") && target.checked) {
            const empresa = target.dataset.empresa;
            const zona = target.dataset.zona;
            document.querySelector(`.emp-check[value="${CSS.escape(empresa)}"]`).checked = true;
            document.querySelector(`.zona-check[data-empresa="${CSS.escape(empresa)}"][value="${CSS.escape(zona)}"]`).checked = true;
            document.querySelector(`.zona-group[data-empresa="${CSS.escape(empresa)}"]`)?.classList.remove("d-none");
            document.querySelector(`.sucursal-group[data-empresa="${CSS.escape(empresa)}"][data-zona="${CSS.escape(zona)}"]`)?.classList.remove("d-none");
        }

        if (target.classList.contains("suc-check")) {
            syncAllSucursalesCheck(target.dataset.empresa, target.dataset.zona);
        }
    });

    window.guardarAsignacion = async () => {
        if (!currentUserId) return;
        const asignacionSucursales = [];

        document.querySelectorAll(".emp-check:checked").forEach(empChk => {
            const empresa = empChk.value;
            const zonas = [];
            document.querySelectorAll(`.zona-check[data-empresa="${CSS.escape(empresa)}"]:checked`).forEach(zonaChk => {
                const zona = zonaChk.value;
                const sucursales = Array.from(document.querySelectorAll(`.suc-check[data-empresa="${CSS.escape(empresa)}"][data-zona="${CSS.escape(zona)}"]:checked`)).map(chk => chk.value);
                zonas.push({ zona, sucursales });
            });
            asignacionSucursales.push({ empresa, zonas });
        });

        try {
            await update(ref(db, `usuarios/${currentUserId}`), { asignacionSucursales });
            Swal.fire({ icon: "success", title: "Asignación guardada", text: "Se asignaron correctamente las sucursales", timer: 1200, showConfirmButton: false });
            bootstrap.Modal.getInstance(document.getElementById("modalEmpresas")).hide();
        } catch (e) {
            Swal.fire("Error", e.message, "error");
        }
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = e => {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };
</script>
</body>
</html>
