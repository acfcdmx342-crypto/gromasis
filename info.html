function paginacion(total){

let paginas=Math.ceil(total/registrosPagina);

let html='';

html+='<nav>';

html+='<ul class="pagination justify-content-center">';

for(let i=1;i<=paginas;i++){

html+=`

<li class="page-item

${paginaActual==i?'active':''}">

<a

class="page-link"

href="#"

onclick="irPagina(${i})">

${i}

</a>

</li>

`;

}

html+='</ul>';

html+='</nav>';

return html;

}

status:document.getElementById("status").value

};

});
